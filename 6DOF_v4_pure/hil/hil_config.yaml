target:
  channel: tcp
  tcp:
    host: 0.0.0.0
    port: 4560
    timeout_s: 600.0
  serial:
    device: /dev/ttyACM0
    baud: 921600
timing:
  enabled: true
  deadline_us: 20000      # بوابة: خطوات MPC > هذه القيمة تُعدّ deadline misses
# ─── إعدادات التسليح والـ warm-up ──────────────────────────────────────────
# الجسر يُرسل أمر ARM بشكل متكرر وينتظر أول رسالة HIL_ACTUATOR_CONTROLS
# من PX4 — هذا يعني PX4 سلّم نفسه ويُحكم وهو جاهز للطيران.
# بعد أول actuator msg ينتظر settle_after_arm_s ثم يبدأ المحاكاة فوراً.
warmup:
  timeout_s: 60.0           # حد أقصى للانتظار (ثانية)
  arm_every_s: 1.0          # أرسل ARM كل هذه المدة
  settle_after_arm_s: 8.0   # استقرار EKF بعد أول actuator msg (موسّع من 2s إلى 8s)
  max_s: 30.0               # بعد هذا الوقت يُكمل بدون arm
  set_hitl_param: true      # تفعيل SYS_HITL=1 عبر PARAM_SET قبل warm-up
  hitl_param_timeout_s: 5.0 # مهلة انتظار PARAM_VALUE المؤكد (على قناة 5760)
  clear_flight_termination: true  # إرسال DO_FLIGHTTERMINATION=0 قبل ARM
  preflight_reset: true     # force-stop للتطبيق + إعادة إعداد adb reverse/forward قبل بدء الجسر
  abort_on_no_actuator: true  # افشل صراحة إن لم يصل HIL_ACTUATOR_CONTROLS خلال warm-up
                              # (مؤشر على SYS_HITL غير مُفعَّل أو simulator_mavlink ساقط)
# ─── إعدادات خاصة بـ HIL ──────────────────────────────────────────────────
# HIL يعمل في closed_loop فقط: مسار الديناميكا = زاوية السيرفو المقاسة
# (SRV_FB) → المحاكاة مباشرة. نموذج Python السيرفو مُعطَّل لتفادي مضاعفة
# التأخير (العتاد الحقيقي فيه τ فيزيائي بالفعل). يكشف
# backlash/slew/CAN-latency/jitter الحقيقي.
# السيرفوهات حقيقية على CAN. فيدباك SRV_FB عبر DEBUG_FLOAT_ARRAY id=1
# يصدر من XqpowerCan driver بعد قراءة PDO auto-report من السيرفوهات.
hil:
  # mode اختياري: إن وُجد يجب أن يكون 'closed_loop' (monitor_only أُزيل).
  mode: closed_loop
  servo_feedback_timeout_ms: 200.0      # يُعدّ الفيدباك قديماً بعد 200ms
  # إذا شاخ الفيدباك > abort_ms بعد انقضاء grace_ms من بدء حلقة
  # الطيران، نوقف المحاكاة (bench abort، ليس flight termination).
  servo_feedback_abort_ms: 500.0
  servo_feedback_grace_ms: 500.0
  require_all_servos_online: false      # إن true: جميع السيرفوهات الأربعة لازم تكون online_mask=0x0F
  # ─── المعايرة التلقائية لتصفير السيرفوهات قبل الإقلاع ──────────────────
  # قبل حلقة الطيران، يُرسل الجسر أوامر cmd=0 لكل سيرفو لفترة استقرار،
  # ثم يجمع عيّنات من feedback ويحسب متوسط الانحراف الميكانيكي (zero-offset).
  # يُطرح هذا الانحراف تلقائياً من كل قياس feedback لاحق (في servo_log
  # وطبقة السلامة). يُحسّن دقة مقارنة cmd vs fb بعد المعايرة.
  servo_auto_zero: true                 # تمكين المعايرة التلقائية
  servo_zero_settle_s: 4.0              # زمن استقرار قبل العيّنات (ثانية)
  servo_zero_sample_s: 2.0              # زمن جمع العيّنات (ثانية)
  servo_zero_max_deg: 10.0              # حد أقصى لانحراف مقبول؛ أكبر = خطأ hardware
                                        # (انحراف >10° يُرفض تلقائياً — راجع تركيب الزعنفة)
scenario:
  sim_config: config/6dof_config_advanced.yaml
  duration_s: 500.0
  dt_s: 0.01
  random_seed: 42
thresholds:
  servo_tracking:
    # fin_act = الزاوية المقاسة من العتاد (fin_can)، fin_cmd = أمر MPC.
    # العتبة تقيس أداء السيرفو الحقيقي (backlash/slew/jitter). قد
    # تحتاج لرفعها مع خصائص العتاد الواقعية.
    tracking_mae_max_deg: 1.5   # MAE (deg)
    tracking_p95_max_deg: 3.0   # P95 خطأ تتبع (deg) — τ=15ms يسبب ~1.3° عند أمر مفاجئ
  timing:
    mpc_p95_max_us: 10000
    mpc_p99_max_us: 15000
    cycle_p95_max_us: 15000
    deadline_miss_max: 0
    jitter_std_max_us: 2000
output:
  results_dir: 6DOF_v4_pure/hil/results
  csv_name: hil_flight.csv
  timing_csv: hil_timing.csv
  html_report: hil_comparison.html
  archive: true
