# ============================================================================
# ملف خصائص الصاروخ - صاروخ باليستي تكتيكي بعيد المدى
# Rocket Properties Configuration File - Long-Range Tactical Ballistic Missile
# ============================================================================
#
# هذا الملف يحتوي على الخصائص الفيزيائية لصاروخ باليستي تكتيكي
# المدى: 300-500 كم
# تُستخدم بواسطة حزمة rocket_models لحسابات الديناميكا والتحكم
#
# ============================================================================

# ==========================================================================
# خصائص الكتلة
# Mass Properties
# ==========================================================================

# الكتلة الجافة (بدون الوقود) - كجم
mass_dry_kg: 575.36

# كتلة الوقود - كجم
propellant_mass_kg: 206.14

# ==========================================================================
# مركز الثقل
# Center of Gravity
# ==========================================================================

# موقع مركز الثقل الجاف في إطار الجسم [x, y, z] - م
cg_dry_body_m: [2.098, -0.000, 0.00]

# موقع مركز ثقل الوقود في إطار الجسم [x, y, z] - م
cg_propellant_body_m: [2.202, -0.000, 0.00]
# cg المرحلة الثانية 2202
# ==========================================================================
# عزوم القصور الذاتي
# Moments of Inertia
# ==========================================================================

# عزوم القصور الذاتي الجافة [Ixx, Iyy, Izz] - كجم.م²
inertia_dry_kgm2: [ 42.3, 472.7,472.7]

# عزوم القصور الذاتي الكاملة (مع الوقود) [Ixx, Iyy, Izz] - كجم.م²
# Full moments of inertia (with propellant) [Ixx, Iyy, Izz] - kg·m²
# ⚠️ مهم: يجب تحديد هذه القيم من CAD أو الاختبارات للحصول على أفضل دقة
# ⚠️ IMPORTANT: These values should be specified from CAD or testing for best accuracy
# إذا لم يتم تحديدها، سيتم تقديرها باستخدام نظرية المحاور المتوازية
# If not specified, values will be estimated using parallel axis theorem
inertia_full_kgm2: [ 50.9, 509 , 509]  # TODO: أدخل القيم الفعلية | Enter actual values

# ==========================================================================
# الأبعاد المرجعية
# Reference Dimensions
# ==========================================================================

# القطر المرجعي - م
ref_diameter_m: 0.1

# الطول المرجعي - م
ref_length_m: 3.232

# المساحة المرجعية (π × (d/2)²) - م²
ref_area_m2: 0.007854

# ==========================================================================

# ==========================================================================
# معاملات الفوهة
# Nozzle Parameters=========================================

# مساحة خروج الفوهة (Ae) - م²
nozzle_exit_area_m2: 0.1116

# ضغط مستوى سطح البحر القياسي (p_0) - باسكال
sea_level_pressure_Pa: 74680

# ==========================================================================
# خصائص الدفات

# ==========================================================================
# هندسة الوقود (اختياري - لتحسين دقة حساب عزم القصور الذاتي)
# Propellant Geometry (Optional - For Improved Inertia Calculation Accuracy)
# ==========================================================================
#
# ملاحظة: هذه المعاملات اختيارية. إذا لم يتم تحديدها، سيتم تقدير القيم تلقائياً
# Note: These parameters are optional. If not specified, values will be estimated automatically
#
# يُنصح بتحديد هذه القيم للحصول على أفضل دقة في حسابات عزم القصور الذاتي
# Recommended to specify these values for best accuracy in inertia calculations

# نصف القطر الخارجي لحبة الوقود - م
# Outer radius of propellant grain - m
# propellant_outer_radius_m:  # TODO: أدخل القيمة الفعلية | Enter actual value

# طول حبة الوقود - م  
# Length of propellant grain - m
# propellant_length_m:  # TODO: أدخل القيمة الفعلية | Enter actual value

# نسبة نصف القطر الداخلي إلى الخارجي (0 = صلب، 0.5 = مجوف نموذجي، <1)
# Ratio of inner to outer radius (0 = solid, 0.5 = typical hollow, <1)
# propellant_inner_radius_ratio: 0.5  # TODO: عدّل حسب التصميم | Adjust per design
CA_multiplier: 1.0
burn_time_scale: 1.045
thrust_multiplier: 0.98

# ==========================================================================
# إعدادات الزعانف والتكوين
# Fin and Configuration Settings
# ==========================================================================

config_type: "X"
fin_location: "canard"

# Fin Properties
# ==========================================================================

fin:
  # مساحة الدفة الواحدة - م²
  S_fin_m2: 0.15467905
  
  # طول وتر الدفة - م
  c_fin_m: 0.434
  
  # موقع الدفة x في إطار الجسم - م
  x_fin_m: 2.53
  
  # الحد الأقصى لانحراف الدفة - درجة
  delta_max_deg: 20.0
  
  # الحد الأقصى لمعدل الدفة - درجة/ث
  delta_dot_max_deg_s: 300.0

# ==========================================================================
# معاملات المراحل
# Stage Parameters
# ==========================================================================

# عدد المراحل
num_stages: 1

# ==========================================================================
# خصائص المشغلات (Actuator Properties)
# ==========================================================================
actuator:
  type: "Hydraulic Actuator"
  motor: "hydraulic"
  model: 2
  tau_servo: 0.03
  wn: 60.0
  zeta_wn: 60.0
  delay_steps: 3
  delay_buffer_size: 8
  delta_max: 20.0
  delta_min: -20.0
  rate_max: 150.0
  n_actuators: 4
  delta_trim: [0.0, 0.0, 0.0, 0.0]
  delta_scale: [1.0, 1.0, 1.0, 1.0]
  backlash: 0.1
  torque_max_Nm: 80.0
  voltage: 28.0
